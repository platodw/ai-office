<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>AI Office</title>
  <link rel="stylesheet" href="sidepanel.css">
</head>
<body>
  <!-- Setup screen: server URL + account token -->
  <div id="setup-screen">
    <div class="setup-inner">
      <img src="logo-mark.svg" class="setup-logo" alt="AI Office">
      <h2>AI Office</h2>
      <p>Let's get you connected.</p>
      <div class="setup-status" id="setup-status" data-state="checking">
        <span class="setup-status-dot"></span>
        <span class="setup-status-text" id="setup-status-text">Checking your setup…</span>
      </div>
      <p class="setup-status-hint hidden" id="setup-status-hint"></p>
      <label class="setup-label" style="margin-top:8px">Web app URL</label>
      <input type="text" id="web-app-url-input" placeholder="https://aioffice.app" autocomplete="off">
      <label class="setup-label" style="margin-top:8px">AI Office token <span class="setup-label-hint">(from your dashboard)</span></label>
      <input type="text" id="account-token-input" placeholder="Paste your token here" autocomplete="off">
      <button id="connect-btn">Continue</button>
      <p class="hint">Get your token at <a href="https://aioffice.app/dashboard" target="_blank">aioffice.app/dashboard</a></p>
      <details class="advanced-settings">
        <summary>Advanced</summary>
        <label class="setup-label">Local server URL (HTTP fallback)</label>
        <input type="text" id="server-url-input" placeholder="http://127.0.0.1:7848" autocomplete="off">
      </details>
    </div>
  </div>

  <!-- Main panel -->
  <div id="chat-screen" class="hidden">

    <!-- Header -->
    <div class="app-header">
      <div class="brand">
        <img src="logo-mark.svg" alt="AI Office">
        <span class="brand-name">AI Office</span>
      </div>
      <span class="endorsement">by Dan Plato Consulting</span>
    </div>

    <!-- Current page context + active step -->
    <div class="context-bar">
      <div class="page-context-pill">
        <img id="page-favicon" class="page-favicon" src="" alt="" style="display:none">
        <span id="page-title" class="page-title">No page loaded</span>
      </div>
      <div id="step-pill" class="step-pill hidden">
        <span class="step-pill-label">Step</span>
        <span id="step-pill-title" class="step-pill-title"></span>
        <button id="step-expand-btn" class="step-expand-btn" title="View instructions">▾</button>
        <span class="step-pill-divider"></span>
        <button id="step-complete-btn" class="step-complete-btn" title="Mark complete">✓</button>
      </div>
    </div>

    <!-- Step instructions dropdown -->
    <div id="step-detail" class="step-detail hidden">
      <div id="step-detail-body" class="step-detail-body"></div>
    </div>

    <!-- Quick actions -->
    <div class="quick-actions">
      <div id="action-btns"></div>
      <button id="add-action-btn" title="Manage actions">+</button>
    </div>

    <!-- Actions editor (hidden by default) -->
    <div id="actions-editor" class="hidden">
      <div class="editor-header">
        <span>Actions</span>
        <button id="close-editor-btn">✕</button>
      </div>
      <div id="actions-list"></div>
      <div class="new-action-form">
        <div class="new-action-icon-label-row">
          <div class="icon-picker-wrap"><input type="text" id="new-action-icon" placeholder="🔹" maxlength="8" title="Click to pick an emoji" readonly></div>
          <input type="text" id="new-action-label" placeholder="Label" maxlength="24">
        </div>
        <textarea id="new-action-prompt" placeholder="Prompt" rows="3"></textarea>
        <button id="save-action-btn">Add Action</button>
      </div>
    </div>

    <div id="messages" class="messages"></div>

    <div class="input-row">
      <textarea id="user-input" placeholder="Ask something..." rows="2"></textarea>
      <button id="send-btn" title="Send">&#x27A4;</button>
    </div>
    <div class="bottom-bar">
      <button id="clear-btn">Clear chat</button>
      <div class="bottom-bar-right">
        <button id="reload-context-btn" title="Re-read current page">&#x21BA; Refresh</button>
        <div id="mcp-dot" class="mcp-dot" title="Server status"></div>
        <button id="settings-btn" title="Settings">&#x2699;</button>
      </div>
    </div>
  </div>

  <script src="sidepanel.js"></script>
</body>
</html>
